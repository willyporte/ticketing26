<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sfondo amber arrotondato -->
  <rect width="32" height="32" rx="7" fill="#f59e0b"/>

  <!-- Corpo biglietto (bianco) con tacche laterali -->
  <rect x="3.5" y="10" width="25" height="12" rx="2" fill="white"/>
  <!-- Tacca sinistra -->
  <circle cx="3.5" cy="16" r="3" fill="#f59e0b"/>
  <!-- Tacca destra -->
  <circle cx="28.5" cy="16" r="3" fill="#f59e0b"/>

  <!-- Linea stub verticale -->
  <rect x="10.5" y="10" width="1.2" height="12" fill="#fde68a"/>

  <!-- Spunta (checkmark) nella parte principale del biglietto -->
  <path d="M15 15.5 L18 19 L25.5 12.5"
        stroke="#f59e0b" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
